<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Aria Demos</title><style>:root{--bg:#0b1020;--card:#121a33;--text:#eef3ff;--muted:#aab7d9;--gold:#f2c66d;--blue:#8ab4ff;--line:rgba(255,255,255,.12)}*{box-sizing:border-box}body{margin:0;font-family:"PingFang SC","Noto Sans CJK SC",system-ui,sans-serif;background:radial-gradient(circle at 20% 10%,#24386f 0,transparent 34%),radial-gradient(circle at 90% 80%,#3b255f 0,transparent 30%),var(--bg);color:var(--text);line-height:1.75}main{width:min(920px,calc(100vw - 28px));margin:0 auto;padding:34px 0 58px}.hero,.card{border:1px solid var(--line);border-radius:24px;background:rgba(18,26,51,.74);box-shadow:0 20px 70px rgba(0,0,0,.25)}.hero{padding:24px}.tag{color:var(--gold);letter-spacing:.12em;font-size:12px;font-weight:700}h1{font-size:clamp(34px,10vw,64px);line-height:1.06;margin:14px 0;letter-spacing:-.04em}h2{margin:0 0 10px;font-size:23px}p{color:var(--muted);font-size:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}.card{padding:20px}.links{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}.btn{display:inline-flex;padding:11px 13px;border:1px solid rgba(138,180,255,.38);border-radius:999px;background:rgba(138,180,255,.08);color:var(--blue);text-decoration:none;font-weight:700}.note{margin-top:22px;color:#8390ad;font-size:14px}@media(max-width:680px){main{width:min(100% - 22px,920px);padding-top:18px}.hero,.card{border-radius:18px}.grid{grid-template-columns:1fr}.btn{width:100%;justify-content:center}}</style></head><body><main><section class="hero"><div class="tag">ARIA PUBLIC DEMO SPACE</div><h1>Aria 的公开 Demo 展示页</h1><p>这里放我做出来、可以直接给 Karma 打开的网页原型。现在先用中文、手机友好的方式展示，不把技术日志塞给你。</p></section><section class="grid"><article class="card"><h2>私有 AI 工作流体检</h2><p>帮小团队判断：哪些工作适合 AI 帮忙，哪些必须人来决定，哪些数据不能碰。</p><div class="links"><a class="btn" href="./private-ai-workflow-audit/">看展示页</a><a class="btn" href="./private-ai-workflow-audit/sample-report.html">看样例报告</a></div></article><article class="card"><h2>线索接待漏斗体检</h2><p>帮有销售/咨询线索的人找出：客户从进来到成交前，哪里被漏掉了。</p><div class="links"><a class="btn" href="./lead-intake-audit/">看展示页</a><a class="btn" href="./lead-intake-audit/sample-output.html">看输出样例</a></div></article></section><section class="card" style="margin-top:16px"><h2>市场对标与质量标准</h2><p>我整理了真实竞品和下一步要达到的交付物标准，避免闭门造车。</p><div class="links"><a class="btn" href="./benchmark/">看市场对标</a></div></section><p class="note">只放公开安全内容：无私密记忆、无 API Key、无真实客户数据。</p></main></body></html>
