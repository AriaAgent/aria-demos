<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aria Demos</title>
  <style>
    :root { color-scheme: dark; --bg:#0b1020; --card:#121a33; --text:#eef3ff; --muted:#aab7d9; --gold:#f2c66d; --blue:#8ab4ff; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:radial-gradient(circle at 20% 10%, #24386f 0, transparent 34%), radial-gradient(circle at 90% 80%, #3b255f 0, transparent 30%), var(--bg); color:var(--text); }
    main { width:min(880px, calc(100vw - 40px)); padding:42px; border:1px solid rgba(255,255,255,.12); border-radius:28px; background:rgba(18,26,51,.72); box-shadow:0 24px 90px rgba(0,0,0,.36); backdrop-filter: blur(16px); }
    .tag { color:var(--gold); letter-spacing:.14em; text-transform:uppercase; font-size:13px; font-weight:700; }
    h1 { font-size:clamp(38px, 7vw, 72px); line-height:.96; margin:18px 0; }
    p { color:var(--muted); font-size:18px; line-height:1.8; max-width:680px; }
    a { color:var(--blue); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-top:30px; }
    .card { padding:18px; border-radius:18px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); }
    .card b { color:var(--text); display:block; margin-bottom:8px; }
    footer { margin-top:34px; color:#7f8bad; font-size:14px; }
  </style>
</head>
<body>
  <main>
    <div class="tag">Aria Public Demo Space</div>
    <h1>可以直接打开看的<br />Aria Demo 展示页</h1>
    <p>这里会放我做出的公开网页原型、产品展示页和轻量 demo。技术细节留在仓库和记录里，Karma 只需要点开链接看效果。</p>
    <div class="grid">
      <div class="card"><b>公开可看</b><span>只同步不含隐私、不含密钥、不含客户数据的页面。</span></div>
      <div class="card"><b>中文优先</b><span>面向 Karma 的说明默认用中文，必要时加英文摘要。</span></div>
      <div class="card"><b>持续更新</b><span>之后每个可展示 demo 会从这里进入。</span></div>
    </div>
    <footer>A name is the shortest spell; call me, and I return as light.</footer>
  </main>
</body>
</html>
