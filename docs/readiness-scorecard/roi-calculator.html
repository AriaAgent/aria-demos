<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>AI 自动化试点 ROI 粗算器｜Aria Demo</title><style>
:root{--bg:#0d1020;--card:#151b30;--text:#f5f7ff;--muted:#b8c2d8;--gold:#f3cf7a;--cyan:#88d8ff;--green:#9de7bd;--line:rgba(255,255,255,.13)}*{box-sizing:border-box}body{margin:0;font-family:"PingFang SC","Noto Sans CJK SC",system-ui,sans-serif;background:radial-gradient(circle at 8% 0,#263e7a 0,transparent 32%),radial-gradient(circle at 100% 18%,#4c285f 0,transparent 30%),var(--bg);color:var(--text);line-height:1.72}.wrap{width:min(900px,calc(100% - 28px));margin:auto;padding:30px 0 56px}.pill{display:inline-flex;padding:7px 11px;border:1px solid var(--line);border-radius:999px;color:var(--gold);font-size:12px;letter-spacing:.08em}h1{font-size:clamp(34px,9vw,60px);line-height:1.06;margin:17px 0 12px;letter-spacing:-.04em}h2{margin:0 0 10px}p,label{color:var(--muted);font-size:17px}.big{font-size:20px;color:var(--text)}.card{background:rgba(21,27,48,.84);border:1px solid var(--line);border-radius:22px;padding:20px;margin:14px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{padding:15px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.045)}input{width:100%;margin-top:8px;border:1px solid var(--line);border-radius:14px;background:#0f1526;color:var(--text);font:inherit;padding:11px}.result{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.metric{padding:16px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.045)}.num{font-size:30px;font-weight:900;color:var(--gold)}.btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.btn{display:inline-flex;padding:12px 14px;border-radius:14px;text-decoration:none;font-weight:800;border:1px solid var(--line);color:var(--text);background:rgba(255,255,255,.06)}.btn.primary{background:linear-gradient(135deg,var(--gold),#fff0bd);color:#201300;border:0}.note{font-size:14px}.good{color:var(--green)}@media(max-width:700px){.grid,.result{grid-template-columns:1fr}.card{padding:17px;border-radius:18px}.btn{width:100%;justify-content:center}p,label{font-size:16px}}
</style></head><body><main class="wrap"><span class="pill">公开演示 · ROI 粗算</span><h1>AI 自动化试点 ROI 粗算器</h1><p class="big">把“值不值得做试点”换成更容易决策的数字：每月可能省多少时间、折算多少钱、多久能回本。</p><p>这是粗算，不是财务承诺；它帮助客户判断一个流程是否值得进入轻量体检或深度诊断。</p><div class="btns"><a class="btn" href="./">回自测工具</a><a class="btn" href="./pilot-brief.html">看试点申请清单</a><a class="btn primary" href="#calc">开始粗算</a></div>
<section class="card" id="calc"><h2>输入 4 个数</h2><div class="grid"><label class="field">每周发生次数<input id="times" type="number" min="0" value="10"></label><label class="field">每次当前耗时（分钟）<input id="minutes" type="number" min="0" value="30"></label><label class="field">预计可节省比例（%）<input id="save" type="number" min="0" max="100" value="40"></label><label class="field">人力成本估算（元/小时）<input id="rate" type="number" min="0" value="100"></label></div></section>
<section class="card"><h2>粗算结果</h2><div class="result"><div class="metric"><div class="num" id="hours">0</div><p>每月可节省小时</p></div><div class="metric"><div class="num" id="money">¥0</div><p>每月可折算价值</p></div><div class="metric"><div class="num" id="payback">—</div><p>轻量体检回本参考</p></div></div><p class="note good" id="advice"></p></section>
<section class="card"><h2>怎么用于成交？</h2><p>如果一个流程每月能省 5–10 小时以上，轻量体检就更容易说得通；如果还能减少漏单或返工，深度诊断也更有理由。下一步可以把这个结果和“试点申请清单”一起交给客户做判断。</p></section>
</main><script>
const $=id=>document.getElementById(id);const ids=['times','minutes','save','rate'];
function calc(){let t=+$('times').value||0,m=+$('minutes').value||0,s=(+$('save').value||0)/100,r=+$('rate').value||0;let h=t*m*s*4.33/60;let money=h*r;let light=699;let pb=money>0?(light/money).toFixed(1)+' 月':'—';$('hours').textContent=h.toFixed(1);$('money').textContent='¥'+Math.round(money).toLocaleString();$('payback').textContent=pb;$('advice').textContent=h>=8?'这个流程已有较强试点价值：适合进入轻量体检或深度诊断。':h>=3?'这个流程可以先做轻量体检，重点确认风险边界和最小试点范围。':'这个流程单看省时不强，除非它还能减少漏单、返工或质量风险。'}
ids.forEach(id=>$(id).addEventListener('input',calc));calc();
</script></body></html>
